<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHIMBA WIFI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(180deg, #070b14 0%, #0b1220 100%);
  color: #eaf2ff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}
.logo {
  width: 64px; height: 64px; border-radius: 18px;
  background: linear-gradient(135deg, #22d3ee, #3b82f6);
  display: grid; place-items: center;
  font-size: 32px; font-weight: 900; color: #001018;
  box-shadow: 0 8px 32px -8px rgba(34,211,238,0.5);
  margin-bottom: 16px;
}
h1 {
  font-size: 26px; font-weight: 900; letter-spacing: 2px;
  background: linear-gradient(135deg, #22d3ee, #93c5fd);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
p { color: #8aa0c4; font-size: 14px; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #1f2a44;
  border-top-color: #22d3ee;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="logo">S</div>
<h1>SHIMBA WIFI</h1>
<p id="status">Inaelekeza kwenye lango la huduma...</p>
<div class="spinner"></div>

<!-- Hidden form that posts to hotspot (for auto-login with voucher code) -->
<form method="post" action="$(link-login-only)" id="login-form" style="display:none">
  <input type="hidden" name="username" id="form-username" value="">
  <input type="hidden" name="password" id="form-password" value="">
  <input type="hidden" name="dst" value="$(link-orig)">
  <input type="hidden" name="popup" value="true">
</form>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var username = params.get('username') || params.get('user') || '';
  var password = params.get('password') || params.get('pass') || '';

  if (username && password) {
    // Voucher code detected - submit directly to hotspot for login
    document.getElementById('form-username').value = username;
    document.getElementById('form-password').value = password;
    document.getElementById('status').textContent = 'Inakuhakiki...';
    document.getElementById('login-form').submit();
  } else {
    // No voucher - redirect to Vercel portal
    window.location.replace('https://shimba-wifi-hub.vercel.app/?mac=$(mac)&ip=$(ip)');
  }
})();
</script>

<noscript>
  <meta http-equiv="refresh" content="0;url=https://shimba-wifi-hub.vercel.app/?mac=$(mac)&ip=$(ip)">
</noscript>
</body>
</html>
